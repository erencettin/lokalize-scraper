name: Lokalize Event Scraper

on:
  workflow_dispatch:
    inputs:
      sync_mode:
        description: "Sync mode (live | dry_run)"
        required: false
        default: "live"
  schedule:
    - cron: "0 5 * * *" # Daily 08:00 Europe/Istanbul (UTC+3)

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: scraper
      cancel-in-progress: true
    permissions:
      contents: read

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SYNC_MODE: ${{ github.event.inputs.sync_mode || 'live' }}
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      TICKETMASTER_USER_AGENT: "LokalizeApp/1.0 (contact: you@example.com)"
      TICKETMASTER_COUNTRY_CODE: "TR"
      TICKETMASTER_CITY: "Istanbul"
      TICKETMASTER_SIZE: "50"
      TICKETMASTER_MAX_PAGES: "6"
      TICKETMASTER_PAGE_DELAY_SECONDS: "1.0"
      TICKETMASTER_TIMEOUT_SECONDS: "20"
      TICKETMASTER_MAX_RETRIES: "3"
      TICKETMASTER_DETAIL_PRICE_ENABLED: "false"
      TICKETMASTER_DETAIL_PRICE_LIMIT: "0"
      TICKETMASTER_DETAIL_PRICE_TIMEOUT_SECONDS: "15"
      TICKETMASTER_DETAIL_PRICE_MAX_RETRIES: "2"
      TICKETMASTER_LOOKAHEAD_DAYS: "120"

      MUNICIPAL_RSS_ENABLED: "true"
      MUNICIPAL_RSS_URLS: "https://kultur.istanbul/etkinlikler/,https://kultursanat.istanbul/,https://kultur.istanbul/,https://ataturkkitapligi.ibb.gov.tr/tr/Kitaplik/Etkinlikler,https://orkestralar.ibb.istanbul/"
      MUNICIPAL_RSS_CITY_NAME: "Istanbul"
      MUNICIPAL_RSS_TIMEOUT_SECONDS: "20"
      MUNICIPAL_RSS_MAX_RETRIES: "3"
      MUNICIPAL_RSS_LOOKAHEAD_DAYS: "120"
      SERPAPI_CITY: "Istanbul"
      SERPAPI_TIMEOUT_SECONDS: "30"
      SERPAPI_MAX_ATTEMPTS: "2"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Add jitter to avoid rate spikes
        run: |
          sleep $((RANDOM % 180))

      - name: Run Scraper
        env:
          TICKETMASTER_ENABLED: "true"
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
        run: |
          python main.py

      - name: Upload Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs
          path: "*.log"
