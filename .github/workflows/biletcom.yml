name: Bilet.com Sync

on:
  schedule:
    - cron: "45 */6 * * *"
  workflow_dispatch:

concurrency:
  group: lokalize-scraper-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      actions: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Bilet.com Sync
        run: python scripts/main_biletcom.py
        env:
          PYTHONPATH: "."
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          BILETCOM_ENABLED: "true"
          BILETCOM_CLIENT_ID: ${{ secrets.BILETCOM_CLIENT_ID }}
          BILETCOM_CLIENT_SECRET: ${{ secrets.BILETCOM_CLIENT_SECRET }}
          BILETCOM_TIMEOUT_SECONDS: "20"
          BILETCOM_DETAIL_WORKERS: "5"
          BILETCOM_LOOKAHEAD_DAYS: "120"
          SYNC_MODE: live

      - name: Commit and Push Bilet.com Data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/biletcom/
          git stash
          git pull --rebase origin main || true
          git stash pop || true
          git add data/biletcom/
          git diff --staged --quiet || git commit -m "🎡 bilet.com güncellendi - $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Trigger Merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run merge.yml --ref main
