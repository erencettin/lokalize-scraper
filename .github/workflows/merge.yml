name: Merge All Data

on:
  workflow_dispatch:

concurrency:
  group: merge-data
  cancel-in-progress: true

jobs:
  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Merge Data
        run: |
          export PYTHONPATH="."
          python scripts/main_merge.py

      - name: Commit and Push Merged Data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/merged/ data/biletimgo/
          git stash
          git pull --rebase origin main || true
          git stash pop || true
          git add data/merged/ data/biletimgo/
          git diff --staged --quiet || git commit -m "🔄 Veriler birleştirildi - $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
