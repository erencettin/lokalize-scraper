name: Merge All Data

on:
  workflow_run:
    workflows:
      - Ticketmaster & Municipal Sync
      - SerpAPI Sync
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: merge-data
  cancel-in-progress: true

jobs:
  merge:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Merge Data
        run: python scripts/main_merge.py

      - name: Commit and Push Merged Data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add data/merged/
          git diff --staged --quiet || git commit -m "🔄 Veriler birleştirildi - $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
