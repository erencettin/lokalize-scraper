name: Municipal Sync

on:
  schedule:
    - cron: "30 */4 * * *"
  workflow_dispatch:

concurrency:
  group: lokalize-scraper-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      actions: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Municipal Sync
        run: python scripts/main_municipal.py
        env:
          PYTHONPATH: "."
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SYNC_MODE: live
          MUNICIPAL_RSS_ENABLED: "true"
          MUNICIPAL_RSS_URLS: "https://kultur.istanbul/etkinlikler/,https://kultursanat.istanbul/,https://kultur.istanbul/,https://ataturkkitapligi.ibb.gov.tr/tr/Kitaplik/Etkinlikler,https://orkestralar.ibb.istanbul/"
          MUNICIPAL_RSS_CITY_NAME: "Istanbul"
          MUNICIPAL_RSS_TIMEOUT_SECONDS: "20"
          MUNICIPAL_RSS_MAX_RETRIES: "3"
          MUNICIPAL_RSS_LOOKAHEAD_DAYS: "120"
          MUNICIPAL_WEB_ENABLED: "true"
          MUNICIPAL_WEB_CITY_NAME: "Istanbul"
          MUNICIPAL_WEB_USER_AGENT: "LokalizeAppBot/1.0 (contact: iletisim.lokalizeapp@gmail.com)"
          MUNICIPAL_WEB_TIMEOUT_SECONDS: "20"
          MUNICIPAL_WEB_MAX_RETRIES: "3"
          MUNICIPAL_WEB_LOOKAHEAD_DAYS: "120"
          MUNICIPAL_WEB_MAX_ITEMS_PER_SITE: "20"
          MUNICIPAL_WEB_LIST_DELAY_SECONDS: "1.5"
          MUNICIPAL_WEB_DETAIL_DELAY_SECONDS: "1.2"
          SERPAPI_ENABLED: "false"

      - name: Commit and Push Municipal Data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/municipal/
          git stash
          git pull --rebase origin main || true
          git stash pop || true
          git add data/municipal/
          git diff --staged --quiet || git commit -m "🏛️ Municipal güncellendi - $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Trigger Merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run merge.yml --ref main
