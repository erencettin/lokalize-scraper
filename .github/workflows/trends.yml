name: Weekly Trend Report

on:
  schedule:
    - cron: "0 4 * * 0"
  workflow_dispatch:

concurrency:
  group: lokalize-scraper-trends
  cancel-in-progress: false

jobs:
  trends:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - id: quota
        name: Check SerpAPI Quota
        run: python scripts/check_serpapi_quota.py
        env:
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}

      - name: Build Weekly Trend Report
        if: steps.quota.outputs.remaining > 25
        run: python scripts/main_trends.py
        env:
          PYTHONPATH: "."
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          TRENDS_ENABLED: "true"
          TRENDS_LOOKBACK_DAYS: "14"
          TRENDS_MAX_CANDIDATES_PER_CITY: "3"

      - name: Commit and Push Trend Report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/trends/weekly_report.json data/trends/weekly_report.md
          git stash
          git pull --rebase origin main || true
          git stash pop || true
          git add data/trends/weekly_report.json data/trends/weekly_report.md
          git diff --staged --quiet || git commit -m "📈 Haftalık trend raporu güncellendi - $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
