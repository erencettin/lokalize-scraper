name: SerpAPI Sync

on:
  schedule:
    - cron: "0 3 * * 1-5"
  workflow_dispatch:

concurrency:
  group: lokalize-scraper-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      actions: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - id: quota
        name: Check SerpAPI Quota
        run: python scripts/check_serpapi_quota.py
        env:
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}

      - name: Fetch SerpAPI Data
        if: steps.quota.outputs.remaining > 10
        run: python scripts/main_serpapi.py
        env:
          PYTHONPATH: "."
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          SYNC_MODE: live
          SERPAPI_ENABLED: "true"
          SERPAPI_CITY: "Istanbul"
          SERPAPI_TIMEOUT_SECONDS: "30"
          SERPAPI_MAX_ATTEMPTS: "2"
          TICKETMASTER_ENABLED: "false"
          MUNICIPAL_RSS_ENABLED: "false"
          MUNICIPAL_WEB_ENABLED: "false"

      - name: Commit and Push SerpAPI Data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/serpapi/
          git stash
          git pull --rebase origin main || true
          git stash pop || true
          git add data/serpapi/
          git diff --staged --quiet || git commit -m "🔍 SerpAPI güncellendi - $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Trigger Merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run merge.yml --ref main
